<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Raíces Viajeras</title>
    <script src="../js/darkTheme.js"></script>
    <link rel="icon" href="/Raices-Viajeras/img/logos/raices-viajeras-logo0.webp" type="image/webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="auth-page">
    <!-- Guardo el modo desde la URL antes de que arranque el slider para evitar parpadeos. -->
    <script>
        const authParams = new URLSearchParams(window.location.search);
        document.body.dataset.authMode = authParams.get('modo') === 'registro' ? 'registro' : 'login';
    </script>

    <!-- El header compartido se mantiene tambien aqui para no dejar esta pagina aislada. -->
    <header id="header"></header>

    <main class="auth-main">
        <div class="contenedor" id="auth-slider">
            <!-- Este bloque mantiene el mismo juego visual antiguo de login y registro. -->
            <div class="caja_trasera">
                <div class="caja_trasera-login">
                    <h3>¿Ya tienes una cuenta?</h3>
                    <p>Inicia sesión para entrar en la web y recuperar tu cesta.</p>
                    <button id="btn_iniciar-sesion" type="button">Iniciar sesión</button>
                </div>

                <div class="caja_trasera-registro">
                    <h3>¿Aún no tienes una cuenta?</h3>
                    <p>Regístrate para guardar tu sesión y preparar tus viajes.</p>
                    <button id="btn_registrarse" type="button">Registrarse</button>
                </div>
            </div>

            <!-- Este contenedor se desplaza de lado a lado para tapar el formulario inactivo. -->
            <div class="contenedor_login-register">
                <!-- Formulario de login -->
                <form action="php/login_usuarios.php" class="formulario_login" method="POST" novalidate>
                    <h2>Iniciar sesión</h2>

                    <label class="visually-hidden" for="correo_login">Correo electrónico</label>
                    <input type="email" id="correo_login" name="correo_login" autocomplete="email" placeholder="Correo electrónico" required aria-describedby="error-correo_login">
                    <p class="auth-field-error" id="error-correo_login" aria-live="polite"></p>

                    <label class="visually-hidden" for="pwd_login">Contraseña</label>
                    <input type="password" id="pwd_login" name="pwd_login" autocomplete="current-password" placeholder="Contraseña" required aria-describedby="error-pwd_login">
                    <p class="auth-field-error" id="error-pwd_login" aria-live="polite"></p>

                    <div class="form-check auth-inline-row">
                        <label class="form-check-label" for="remember_me">
                            <input class="form-check-input" type="checkbox" name="remember_me" id="remember_me" value="1">
                            Recordarme durante 30 días
                        </label>
                    </div>

                    <button type="submit">Entrar</button>
                </form>

                <!-- Formulario de registro -->
                <form action="php/registros_usuarios.php" method="POST" class="formulario_register" novalidate>
                    <h2>Registrarse</h2>

                    <label class="visually-hidden" for="nombre_completo">Nombre completo</label>
                    <input type="text" id="nombre_completo" name="nombre_completo" autocomplete="name" placeholder="Nombre completo" required aria-describedby="error-nombre_completo">
                    <p class="auth-field-error" id="error-nombre_completo" aria-live="polite"></p>

                    <label class="visually-hidden" for="correo">Correo electrónico</label>
                    <input type="email" id="correo" name="correo" autocomplete="email" placeholder="Correo electrónico" required aria-describedby="error-correo">
                    <p class="auth-field-error" id="error-correo" aria-live="polite"></p>

                    <label class="visually-hidden" for="pwd">Contraseña</label>
                    <input type="password" id="pwd" name="pwd" autocomplete="new-password" placeholder="Contraseña" required aria-describedby="error-pwd">
                    <p class="auth-field-error" id="error-pwd" aria-live="polite"></p>

                    <label class="visually-hidden" for="pwdConfirm">Confirmar contraseña</label>
                    <input type="password" id="pwdConfirm" name="passwordConfirm" autocomplete="new-password" placeholder="Confirmar contraseña" required aria-describedby="error-passwordConfirm">
                    <p class="auth-field-error" id="error-passwordConfirm" aria-live="polite"></p>

                    <div class="radio-group" role="radiogroup" aria-labelledby="genero-label">
                        <span id="genero-label">Género</span>
                        <label><input type="radio" name="genero" value="m" required aria-describedby="error-genero"> M</label>
                        <label><input type="radio" name="genero" value="f" aria-describedby="error-genero"> F</label>
                        <label><input type="radio" name="genero" value="o" aria-describedby="error-genero"> O</label>
                    </div>
                    <p class="auth-field-error" id="error-genero" aria-live="polite"></p>

                    <div class="auth-date-block">
                        <label class="visually-hidden" for="fechaNacimiento">Fecha de nacimiento</label>
                        <p class="auth-date-helper">Fecha de nacimiento</p>
                        <input type="date" id="fechaNacimiento" name="fechaNacimiento" required aria-describedby="error-fechaNacimiento">
                    </div>
                    <p class="auth-field-error" id="error-fechaNacimiento" aria-live="polite"></p>

                    <div class="form-check">
                        <label class="form-check-label" for="politica_privacidad">
                            <input class="form-check-input" type="checkbox" name="politica_privacidad" id="politica_privacidad" value="1" required aria-describedby="error-politica_privacidad">
                            Acepto la política de privacidad
                        </label>

                        <label class="form-check-label" for="revista">
                            <input class="form-check-input" type="checkbox" name="revista" id="revista" value="1">
                            Quiero recibir novedades y revista
                        </label>
                    </div>
                    <p class="auth-field-error" id="error-politica_privacidad" aria-live="polite"></p>

                    <button type="submit">Crear cuenta</button>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/plantillas/header.js"></script>
    <script type="module" src="assets/js/script.js"></script>
</body>
</html>
