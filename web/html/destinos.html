<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Destinos</title>
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/destinos.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/webp" href="../../img/logos/raices-viajeras-logo0.webp">
    <script src="../js/darkTheme.js"></script>
</head>
<body id="body">
    <header id="header"></header>

    <!-- Este hero comparte estructura con provincias para que ambas vistas se sientan parte del mismo flujo. -->
    <section class="buscador-hero">
        <div class="buscador-bg-blob"></div>
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-8 text-center">
                    <p class="buscador-eyebrow">Tu proxima aventura sostenible</p>
                    <h1 class="buscador-title">
                        A donde te llaman<br><em>tus raices</em> hoy?
                    </h1>
                    <p class="buscador-subtitle">
                        Filtra los viajes de esta provincia y elige la experiencia que mejor encaja contigo.
                    </p>
                </div>
            </div>

            <div class="row justify-content-center">
                <div class="col-12 col-lg-8" style="margin-bottom: 1%">
                    <div class="buscador-box">
                        <i class="bi bi-search"></i>
                        <input
                            type="text"
                            class="buscador-input"
                            placeholder="Titulo o descripcion del viaje..."
                            id="buscador-input"
                        >
                        <button class="buscador-btn" id="buscador-btn" type="button">Buscar viaje</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="destinos-section">
        <div class="container">
            <div class="row g-4" id="viajes-wrap"></div>
        </div>
    </section>

    <script type="module" src="../js/plantillas/header.js"></script>
    <script type="module" src="../js/main.js"></script>
    <script src="../js/bootstrap.bundle.min.js"></script>

    <!-- destinos.js carga los viajes de la provincia actual y conecta el buscador local. -->
    <script src="../js/pages/destinos.js"></script>

    <div id="footer"></div>
    <script src="../js/plantillas/footer.js"></script>
</body>
</html>
