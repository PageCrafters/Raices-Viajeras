<!DOCTYPE html>
<html lang="es">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Destinos</title>
        <link href="../css/bootstrap.min.css" rel="stylesheet">
        <style>
            .cards-wrap { display:flex; flex-wrap:wrap; gap:1rem; }
        </style>
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="icon" type="image/webp" href="../../img/logos/raices-viajeras-logo0.webp">
        <script src="../js/darkTheme.js"></script>
</head>
<body id="body">
    <header id="header"></header>
    <main class="container my-4">
        <div id="viajes-wrap" class="cards-wrap"></div>
    </main>
    <script type="module" src="../js/plantillas/header.js"></script>
    <script type="module" src="../js/main.js"></script>
    <script src="../js/bootstrap.bundle.min.js"></script>

    <!--
        Script externo: `../js/pages/destinos.js`
        - Lee el parámetro `provincia_id` de la URL y pide al backend los viajes
          correspondientes a esa provincia (`get_viajes_by_provincia.php`).
        - Por cada viaje genera una card mostrando imagen, título, descripción y precio.
        - Al hacer clic en una card o en el botón se abre `infoAventura.html?viaje=<id>`.
    -->
    <script src="../js/pages/destinos.js"></script>

    <script src="../js/plantillas/footer.js"></script>
</body>
</html>
