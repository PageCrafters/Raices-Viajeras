<!-- Modal comun de cesta: lo carga header.js y lo actualiza cesta.js. -->
<div
    class="modal fade rv-cart-modal"
    id="cestaModal"
    tabindex="-1"
    aria-labelledby="cestaModalLabel"
    aria-hidden="true"
>
    <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content rv-cart-surface">
            <div class="modal-header rv-cart-header">
                <div>
                    <p class="rv-cart-kicker mb-1">Raíces Viajeras</p>
                    <h2 class="modal-title h4 mb-0" id="cestaModalLabel">Tu cesta</h2>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>

            <div class="modal-body">
                <!-- Este estado sirve para login, vacio, error y carga. -->
                <div
                    id="cesta-modal-feedback"
                    class="rv-cart-feedback"
                    role="status"
                    aria-live="polite"
                >
                    Cargando cesta...
                </div>

                <!-- Este bloque solo se muestra cuando ya hay datos reales que pintar. -->
                <div id="cesta-modal-content" class="d-none">
                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                        <p class="rv-cart-inline-note mb-0">Resumen actual de tu selección.</p>
                        <span class="rv-cart-count-pill" id="cesta-modal-count">0 artículos</span>
                    </div>

                    <div id="cesta-modal-items" class="rv-cart-items"></div>

                    <div class="rv-cart-summary mt-4">
                        <p class="rv-cart-summary-label mb-1">Total actual</p>
                        <div class="rv-cart-total" id="cesta-modal-total">0,00 EUR</div>
                        <p class="rv-cart-inline-note mt-2 mb-3">
                            Puedes revisar la cesta aquí y continuar en la página completa cuando quieras.
                        </p>
                        <a id="cesta-modal-cta" href="/Raices-Viajeras/web/html/paga.html" class="btn btn-primario w-100">
                            Ir a la cesta
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
