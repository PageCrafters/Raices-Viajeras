<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blog - RV</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/webp" href="../../img/logos/raices-viajeras-logo0.webp">
    <script src="../js/darkTheme.js"></script>
</head>
<body id="body">
<header id="header"></header>
<script type="module" src="../js/plantillas/header.js"></script>

<div class="container mt-4 px-4">
    <div class="row">

        <div class="col-12 col-xl-3 order-1 order-xl-2 mb-4">
            <!-- Este lateral agrupa buscador y categorias para no recargar la pagina al filtrar. -->
            <div class="mb-4">
                <h6 class="fw-bold">Buscar por categoría</h6>
                <div class="input-group">
                    <input type="text" id="buscador-categoria" class="form-control form-control-sm" placeholder="Escribe una categoría...">
                  <button class="btn btn-success btn-sm" id="btn-buscar">Buscar</button>
    
                </div>
            </div>

            <div>
                <h6 class="fw-bold">Categorías</h6>
                <ul class="list-group" id="lista-categorias">
                    <li class="list-group-item list-group-item-action" data-categoria="Turismo" style="cursor:pointer">
                        Turismo
                    </li>
                    <li class="list-group-item list-group-item-action" data-categoria="Sostenible" style="cursor:pointer">
                        Sostenible
                    </li>
                    <li class="list-group-item list-group-item-action" data-categoria="" style="cursor:pointer">
                        Todas
                    </li>
                </ul>
            </div>
        </div>

        <div class="col-12 col-xl-9 order-2 order-xl-1">
            <!-- blog.js pinta aqui las tarjetas de noticias que devuelve la API. -->
            <div class="row row-cols-1 row-cols-sm-2 row-cols-xl-3" id="noticias-container"></div>
        </div>

    </div>
</div>

<script type="module" src="../js/plantillas/footer.js"></script>
<script src="../js/bootstrap.bundle.min.js"></script>
<script type="module" src="../js/main.js"></script>
<script type="module" src="../js/blog.js"></script>
<script src="https://kit.fontawesome.com/0b95445ffc.js" crossorigin="anonymous"></script>
</body>
</html>
