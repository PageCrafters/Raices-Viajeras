<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blog - RV</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/webp" href="../../img/logos/raices-viajeras-logo0.webp">
    <script src="../js/darkTheme.js"></script>
    <script src="../js/viewport.js"></script>
</head>
<body id="body">
<header id="header"></header>
<script type="module" src="../js/plantillas/header.js"></script>

<!-- Buscador -->
<div class="mb-4" aria-describedby="desc-buscador">
    <h6 class="fw-bold">Buscar por categoría</h6>
    <div class="input-group">
        <input type="text" id="buscador-categoria" class="form-control form-control-sm" placeholder="Escribe una categoría..." aria-label="Buscar por categoría">
        <button class="btn btn-success btn-sm" id="btn-buscar" aria-label="Buscar">
            Buscar
        </button>

    </div>
</div>

<div>
    <h6 class="fw-bold" aria-describedby="desc-categorias">Categorías</h6>
    <ul class="list-group" id="lista-categorias">
        <li class="list-group-item list-group-item-action" data-categoria="Turismo" style="cursor:pointer" aria-describedby="desc-turismo">
            Turismo
        </li>
        <li class="list-group-item list-group-item-action" data-categoria="Sostenible" style="cursor:pointer" aria-describedby="desc-sostenible">
            Sostenible
        </li>
        <li class="list-group-item list-group-item-action" data-categoria="" style="cursor:pointer" aria-describedby="desc-todas">
            Todas
        </li>
    </ul>
</div>

<div class="col-12 col-xl-9 order-2 order-xl-1" aria-describedby="desc-noticias">
    <div class="row row-cols-1 row-cols-sm-2 row-cols-xl-3" id="noticias-container"></div>
</div>

<script type="module" src="../js/plantillas/footer.js"></script>
<script src="../js/bootstrap.bundle.min.js"></script>
<script type="module" src="../js/main.js"></script>
<script type="module" src="../js/blog.js"></script>
<script src="https://kit.fontawesome.com/0b95445ffc.js" crossorigin="anonymous"></script>
</body>
</html>
